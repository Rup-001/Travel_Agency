<!DOCTYPE html>
<html>
<head>
    <title>Socket.io Test - Senior Peer Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #status { font-weight: bold; }
        .connected { color: green; }
        .disconnected { color: red; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 4px; margin-right: 5px; }
        button:hover { background: #0056b3; }
        #messages { max-height: 200px; overflow-y: auto; background: #eee; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Socket.io Debugger 🔍</h1>
        <p id="status" class="disconnected">Status: Disconnected</p>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="joinRoom()">Join Room (Admin)</button>
    </div>

    <div class="box">
        <h3>Real-time Logs:</h3>
        <div id="messages">No notifications yet...</div>
    </div>

    <script>
        let socket;
        function connect() {
            // Local IP check koro (tomar ip 10.10.11.91)
            socket = io("http://10.10.11.91:8000", {
                transports: ["websocket"],
                reconnection: true
            });

            socket.on("connect", () => {
                document.getElementById("status").innerText = "Status: Connected (ID: " + socket.id + ")";
                document.getElementById("status").className = "connected";
                console.log("✅ Connection established!", socket.id);
            });

            socket.on("new-notification", (data) => {
                console.log("📩 New Notification received:", data);
                const msgBox = document.getElementById("messages");
                if(msgBox.innerText === "No notifications yet...") msgBox.innerText = "";
                msgBox.innerHTML += `<div><strong>${data.title}</strong>: ${data.content} <hr/></div>`;
                msgBox.scrollTop = msgBox.scrollHeight;
            });

            socket.on("disconnect", (reason) => {
                document.getElementById("status").innerText = "Status: Disconnected (Reason: " + reason + ")";
                document.getElementById("status").className = "disconnected";
                console.log("❌ Disconnected!", reason);
            });

            socket.on("connect_error", (err) => {
                console.error("⚠️ Connection Error:", err.message);
                document.getElementById("status").innerText = "Status: Error (" + err.message + ")";
            });
        }

        function disconnect() {
            if (socket) socket.disconnect();
        }

        function joinRoom() {
            if (socket) {
                // Tomar Admin User ID use koro
                socket.emit("join-room", { roomId: "699c0bb214d29ef7aab0b1a3" }, (res) => {
                    console.log("🚀 Join Room Ack:", res);
                    alert("Joined Room #699c0bb214d29ef7aab0b1a3 Successfully!");
                });
            } else {
                alert("Please connect first!");
            }
        }
    </script>
</body>
</html>
